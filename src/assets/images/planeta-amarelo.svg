  <!-- Aura FRONT of planet -->
  <g id="aura-front" clip-path="url(#auraClip)"></g>

  <script><![CDATA[
    const NS = "http://www.w3.org/2000/svg";
    const CX = 250, CY = 250, PR = 218;

    // Max drift so particles never leave the clipping circle (r=248)
    // A particle spawns at PR + dist (max 218+26=244) and drifts max 4px outward → stays under 248
    const MAX_OUTER_R = 248;

    const fireColors = [
      "#ffffff","#fffde7","#fff9c4","#fff59d","#ffee58",
      "#ffca28","#ffd740","#ffab00","#ffa726","#ff8f00",
      "#ff7043","#ff6d00","#ff5722","#f4511e","#e64a19",
      "#bf360c","#ff3d00"
    ];

    function rnd(a, b) { return a + Math.random() * (b - a); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function anim(el, attr, values, dur, begin, extra) {
      const a = document.createElementNS(NS, "animate");
      a.setAttribute("attributeName", attr);
      a.setAttribute("values",        values);
      a.setAttribute("dur",           dur + "s");
      a.setAttribute("repeatCount",   "indefinite");
      a.setAttribute("begin",         begin + "s");
      if (extra) Object.entries(extra).forEach(([k,v]) => a.setAttribute(k, v));
      el.appendChild(a);
    }

    // Build one aura particle.
    // spawnDist: how far from planet center the particle starts (PR..PR+26)
    // drift: how far it travels outward (capped so it stays inside MAX_OUTER_R)
    function makeAura(angle, layer) {
      // Spawn right on the planet edge + small offset
      const spawnDist = PR + rnd(1, 20);
      // Cap drift so final position ≤ MAX_OUTER_R
      const maxDrift  = MAX_OUTER_R - spawnDist - 2;
      const drift     = rnd(4, Math.max(5, maxDrift));

      const sx = CX + spawnDist * Math.cos(angle);
      const sy = CY + spawnDist * Math.sin(angle);

      // Drift direction: outward radially + slight tangential wobble
      const spread = rnd(-0.35, 0.35);
      const dAngle = angle + spread;
      const ex = sx + drift * Math.cos(dAngle);
      const ey = sy + drift * Math.sin(dAngle);

      const baseR  = rnd(1.2, 4.5);
      const color  = pick(fireColors);
      const baseOp = rnd(0.35, 0.90);
      const dur    = rnd(0.45, 1.60);
      const begin  = rnd(0, dur); // stagger so they don't all pulse together

      const g = document.createElementNS(NS, "g");
      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx",      sx.toFixed(2));
      c.setAttribute("cy",      sy.toFixed(2));
      c.setAttribute("r",       baseR.toFixed(2));
      c.setAttribute("fill",    color);
      c.setAttribute("opacity", "0");
      c.setAttribute("filter",  "url(#fGlow)");

      const spline = { calcMode: "spline", keySplines: "0.25 0 0.75 1" };

      anim(c, "cx",      `${sx.toFixed(2)};${ex.toFixed(2)};${sx.toFixed(2)}`, dur, begin, spline);
      anim(c, "cy",      `${sy.toFixed(2)};${ey.toFixed(2)};${sy.toFixed(2)}`, dur, begin, spline);
      anim(c, "r",       `${baseR.toFixed(2)};${(baseR*0.12).toFixed(2)};${baseR.toFixed(2)}`, dur, begin, spline);
      anim(c, "opacity", `0;${baseOp.toFixed(2)};0`, dur, begin, spline);

      g.appendChild(c);
      return g;
    }

    // Glow blob: larger, very soft, sits right on edge, just pulses opacity
    function makeGlowBlob(angle) {
      const dist  = PR + rnd(0, 14);
      const x     = CX + dist * Math.cos(angle);
      const y     = CY + dist * Math.sin(angle);
      const baseR = rnd(6, 18);
      const color = pick(["#ff4400","#ff6600","#ff8800","#ffaa00","#ff3300","#ffcc00"]);
      const baseOp = rnd(0.06, 0.20);
      const dur   = rnd(0.3, 1.1);
      const begin = rnd(0, dur);

      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx",      x.toFixed(2));
      c.setAttribute("cy",      y.toFixed(2));
      c.setAttribute("r",       baseR.toFixed(2));
      c.setAttribute("fill",    color);
      c.setAttribute("opacity", baseOp.toFixed(3));
      c.setAttribute("filter",  "url(#fSoft)");
      anim(c, "opacity",
        `${baseOp.toFixed(3)};${(baseOp*0.15).toFixed(3)};${baseOp.toFixed(3)}`,
        dur, begin, null);
      return c;
    }

    const backEl  = document.getElementById("aura-back");
    const frontEl = document.getElementById("aura-front");

    const PARTICLE_COUNT = 600;
    const BLOB_COUNT     = 160;

    // Particles spread evenly around the full circle
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      // Jitter angle so they're not perfectly uniform
      const angle = (i / PARTICLE_COUNT) * Math.PI * 2 + rnd(-0.15, 0.15);

      // Back half: angle where sin < 0 (visually upper arc when no tilt = behind)
      // Front half: sin >= 0
      // Since aura is always "in front of" or "on the rim" conceptually,
      // we split: back layer gets upper hemisphere (y < CY side), front gets lower
      const isUpper = (CY + PR * Math.sin(angle)) < CY; // sin(angle) < 0

      const p = makeAura(angle, isUpper ? "back" : "front");
      if (isUpper) backEl.appendChild(p);
      else         frontEl.appendChild(p);
    }

    // Glow blobs — all go to front layer (they're on the surface rim)
    for (let i = 0; i < BLOB_COUNT; i++) {
      const angle = rnd(0, Math.PI * 2);
      frontEl.appendChild(makeGlowBlob(angle));
    }
  ]]></script>

</svg>
