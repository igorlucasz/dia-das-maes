<svg width="100%" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
  <title>Kawaii planet with fire aura</title>

  <defs>
    <radialGradient id="planetBody" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fffbe0"/>
      <stop offset="18%"  stop-color="#ffe97a"/>
      <stop offset="42%"  stop-color="#ffc733"/>
      <stop offset="75%"  stop-color="#ffab00"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </radialGradient>
    <radialGradient id="spec" cx="33%" cy="27%" r="30%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#fff5c0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffe083" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="58%"  stop-color="#ffe97a" stop-opacity="0"/>
      <stop offset="76%"  stop-color="#ffd54f" stop-opacity="0.28"/>
      <stop offset="88%"  stop-color="#ffe082" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fff8dc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubbleA" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fff0c0"/>
      <stop offset="55%"  stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </radialGradient>
    <radialGradient id="bubbleB" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fffde7"/>
      <stop offset="55%"  stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ffa000"/>
    </radialGradient>
    <radialGradient id="bubbleC" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#fff3e0"/>
      <stop offset="55%"  stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </radialGradient>

    <clipPath id="sph"><circle cx="250" cy="250" r="218"/></clipPath>

    <!-- Clip aura particles to a ring just outside the planet -->
    <clipPath id="auraClip">
      <circle cx="250" cy="250" r="248"/>
    </clipPath>

    <filter id="fGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .planet-group { transform-origin: 250px 250px; }
      .la { animation: rot    90s  linear infinite; transform-origin: 250px 250px; }
      .lb { animation: rotRev 60s  linear infinite; transform-origin: 250px 250px; }
      .lc { animation: rot    75s  linear infinite; transform-origin: 250px 250px; }
      .ld { animation: rotRev 120s linear infinite; transform-origin: 250px 250px; }
      @keyframes rot    { from{transform:rotate(0deg)}   to{transform:rotate(360deg)}  }
      @keyframes rotRev { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
      @keyframes haloBreath { 0%,100%{opacity:0.8} 50%{opacity:1} }
      .halo { animation: haloBreath 3.5s ease-in-out infinite; }
      @keyframes pulseA    { 0%,100%{r:44px} 50%{r:52px} }
      @keyframes pulseB    { 0%,100%{r:29px} 50%{r:35px} }
      @keyframes pulseC    { 0%,100%{r:18px} 50%{r:23px} }
      @keyframes pulseTiny { 0%,100%{r:11px} 50%{r:14px} }
      .bA { animation: pulseA    3.0s ease-in-out infinite; }
      .bB { animation: pulseB    2.5s ease-in-out infinite 0.5s; }
      .bC { animation: pulseC    2.0s ease-in-out infinite 1.0s; }
      .bT { animation: pulseTiny 1.8s ease-in-out infinite 0.3s; }
    </style>
  </defs>

  <!-- Aura BEHIND planet -->
  <g id="aura-back" clip-path="url(#auraClip)"></g>

