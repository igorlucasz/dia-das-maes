<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Nebula cósmica vibrante</title>
  <desc>Fluxo de poeira cósmica com roxos elétricos, magentas neon e azuis profundos, animações fluidas de ondulação e cintilação estelar.</desc>

  <defs>

    <!-- === GRADIENTES LINEARES — corpo da névoa === -->

    <!-- Magenta elétrico → roxo profundo -->
    <linearGradient id="dA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff00aa" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#e6007a" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#cc00cc" stop-opacity="0.70"/>
      <stop offset="80%"  stop-color="#9900dd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6600cc" stop-opacity="0"/>
    </linearGradient>

    <!-- Azul elétrico → ciano neon -->
    <linearGradient id="dB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0044ff" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#0088ff" stop-opacity="0.80"/>
      <stop offset="60%"  stop-color="#00ccff" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
    </linearGradient>

    <!-- Verde-ciano para acento frio -->
    <linearGradient id="dC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#00ddaa" stop-opacity="0.65"/>
      <stop offset="65%"  stop-color="#00ffee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#aaffee" stop-opacity="0"/>
    </linearGradient>

    <!-- Violeta → índigo intenso (arco superior) -->
    <linearGradient id="dD" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#aa00ff" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#8800ff" stop-opacity="0.80"/>
      <stop offset="68%"  stop-color="#bb44ff" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#dd88ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Laranja neon → magenta (arco inferior) -->
    <linearGradient id="dE" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#ff6600" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#ff3399" stop-opacity="0.72"/>
      <stop offset="72%"  stop-color="#ff00cc" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#cc0066" stop-opacity="0"/>
    </linearGradient>

    <!-- Roxo claro → azul royal (flancos externos) -->
    <linearGradient id="dF" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#7700ff" stop-opacity="0"/>
      <stop offset="28%"  stop-color="#5500ee" stop-opacity="0.78"/>
      <stop offset="60%"  stop-color="#8833ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#aa55ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Índigo → turquesa (camada interior) -->
    <linearGradient id="dG" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#0033cc" stop-opacity="0"/>
      <stop offset="38%"  stop-color="#0055ff" stop-opacity="0.58"/>
      <stop offset="68%"  stop-color="#44aaff" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#88ddff" stop-opacity="0"/>
    </linearGradient>

    <!-- === GRADIENTES RADIAIS — iluminação interna / núcleos brilhantes === -->

    <!-- Núcleo magenta quente -->
    <radialGradient id="coreA" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#ff55cc" stop-opacity="0.90"/>
      <stop offset="40%"  stop-color="#cc00aa" stop-opacity="0.60"/>
      <stop offset="75%"  stop-color="#880088" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#440044" stop-opacity="0"/>
    </radialGradient>

    <!-- Núcleo azul frio -->
    <radialGradient id="coreB" cx="55%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#44ccff" stop-opacity="0.85"/>
      <stop offset="38%"  stop-color="#0088ee" stop-opacity="0.55"/>
      <stop offset="72%"  stop-color="#004488" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#001133" stop-opacity="0"/>
    </radialGradient>

    <!-- Núcleo roxo elétrico central -->
    <radialGradient id="coreC" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#cc44ff" stop-opacity="0.80"/>
      <stop offset="45%"  stop-color="#8800cc" stop-opacity="0.50"/>
      <stop offset="80%"  stop-color="#440088" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#220044" stop-opacity="0"/>
    </radialGradient>

    <style>
      /* === ONDULAÇÃO PRINCIPAL === */
      @keyframes undulate {
        0%,100% { transform: rotate(0deg) scaleX(1)     scaleY(1); }
        25%      { transform: rotate(2deg) scaleX(1.018) scaleY(0.984); }
        50%      { transform: rotate(0deg) scaleX(0.984) scaleY(1.018); }
        75%      { transform: rotate(-2deg) scaleX(1.018) scaleY(0.984); }
      }
      @keyframes undulateB {
        0%,100% { transform: rotate(0deg) scaleX(1)     scaleY(1); }
        33%      { transform: rotate(-2.5deg) scaleX(1.022) scaleY(0.980); }
        66%      { transform: rotate(2.5deg) scaleX(0.980) scaleY(1.022); }
      }

      /* === DERIVA LENTA === */
      @keyframes drift {
        0%,100% { transform: translateX(0px)  translateY(0px); }
        50%      { transform: translateX(8px)  translateY(-6px); }
      }
      @keyframes driftB {
        0%,100% { transform: translateX(0px)  translateY(0px); }
        50%      { transform: translateX(-7px) translateY(7px); }
      }
      @keyframes driftC {
        0%,100% { transform: translateX(0px)  translateY(0px); }
        50%      { transform: translateX(5px)  translateY(8px); }
      }

      /* === RESPIRAÇÃO / PULSAÇÃO === */
      @keyframes breathe {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.55; }
      }
      @keyframes breatheB {
        0%,100% { opacity: 0.65; }
        50%      { opacity: 1; }
      }
      @keyframes pulse {
        0%,100% { transform: scale(1);    opacity: 0.85; }
        50%      { transform: scale(1.06); opacity: 1; }
      }
      @keyframes pulseB {
        0%,100% { transform: scale(1),    opacity: 0.70; }
        50%      { transform: scale(1.08); opacity: 0.95; }
      }

      /* === CINTILAÇÃO ESTELAR === */
      @keyframes twinkle {
        0%,100% { opacity: 0.15; r: 2px; }
        50%      { opacity: 1;    r: 3.5px; }
      }
      @keyframes twinkleB {
        0%,20%   { opacity: 1;    r: 3px; }
        60%      { opacity: 0.10; r: 1.5px; }
        100%     { opacity: 1;    r: 3px; }
      }
      @keyframes twinkleC {
        0%,100% { opacity: 0.4;  r: 1.5px; }
        40%      { opacity: 0.05; r: 1px; }
        70%      { opacity: 1;    r: 2.5px; }
      }

      /* === APLICAÇÃO DAS CLASSES === */
      .so  { animation: undulate  20s ease-in-out infinite;         transform-origin: 340px 340px; }
      .sm  { animation: undulateB 26s ease-in-out infinite;         transform-origin: 340px 340px; }
      .si  { animation: undulate  16s ease-in-out infinite reverse; transform-origin: 340px 340px; }

      .ld  { animation: drift  14s ease-in-out infinite; transform-origin: 340px 340px; }
      .ldb { animation: driftB 18s ease-in-out infinite; transform-origin: 340px 340px; }
      .ldc { animation: driftC 11s ease-in-out infinite; transform-origin: 340px 340px; }

      .ba  { animation: breathe  10s ease-in-out infinite; }
      .bb  { animation: breatheB  8s ease-in-out infinite; }
      .bc  { animation: breathe  13s ease-in-out infinite 3s; }
      .bd  { animation: breatheB  9s ease-in-out infinite 5s; }

      .pa  { animation: pulse  6s ease-in-out infinite;     transform-origin: 340px 200px; }
      .pb  { animation: pulse  8s ease-in-out infinite 2s;  transform-origin: 340px 490px; }
      .pc  { animation: pulse  7s ease-in-out infinite 4s;  transform-origin: 130px 340px; }

      .tw1 { animation: twinkle  3.2s ease-in-out infinite; }
      .tw2 { animation: twinkleB 2.5s ease-in-out infinite 0.4s; }
      .tw3 { animation: twinkleC 4.0s ease-in-out infinite 1.1s; }
      .tw4 { animation: twinkle  2.8s ease-in-out infinite 1.8s; }
      .tw5 { animation: twinkleB 3.6s ease-in-out infinite 0.9s; }
      .tw6 { animation: twinkleC 2.2s ease-in-out infinite 2.4s; }
      .tw7 { animation: twinkle  4.4s ease-in-out infinite 0.6s; }
      .tw8 { animation: twinkleB 3.0s ease-in-out infinite 3.0s; }
      .tw9 { animation: twinkleC 2.6s ease-in-out infinite 1.5s; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════
       CAMADA EXTERNA — arcos amplos, menor opacidade
  ═══════════════════════════════════════════════════ -->
  <g class="so">

