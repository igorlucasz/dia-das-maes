           C 175 178, 148 270, 158 345
           C 168 420, 210 490, 275 525
           C 318 548, 368 550, 412 532
           C 490 500, 540 430, 548 355
           C 556 275, 518 195, 460 155
           C 420 128, 382 112, 340 110
           Z"/>
    </g>

    <g class="bb">
      <path fill="url(#dB)" opacity="0.65"
        d="M 340 42
           C 516 38, 658 128, 660 295
           C 662 435, 568 555, 438 596
           C 358 622, 265 618, 190 576
           C 88 518, 28 400, 30 285
           C 32 155, 128 60, 250 40
           C 280 35, 310 40, 340 42
           Z
           M 340 130
           C 308 128, 282 140, 260 158
           C 194 206, 172 300, 184 372
           C 196 445, 240 506, 300 535
           C 336 552, 376 552, 410 536
           C 478 504, 520 438, 526 366
           C 534 285, 500 208, 445 168
           C 408 142, 375 132, 340 130
           Z"/>
    </g>

    <!-- Flancos externos — acento roxo -->
    <g class="ld bc">
      <path fill="url(#dF)" opacity="0.68"
        d="M 148 200
           C 95 255, 72 328, 82 395
           C 88 432, 104 468, 128 498
           C 96 460, 75 415, 65 362
           C 48 280, 76 195, 132 148
           Z"/>
      <path fill="url(#dF)" opacity="0.55"
        d="M 580 200
           C 628 256, 648 328, 638 395
           C 632 432, 616 468, 592 498
           C 624 460, 645 415, 655 362
           C 672 280, 644 195, 588 148
           Z"/>
    </g>

    <!-- Núcleo radial magenta no topo -->
    <g class="pa">
      <path fill="url(#coreA)" opacity="0.55"
        d="M 240 80 C 300 55, 390 55, 450 80 C 510 108, 550 155, 540 180
           C 530 158, 492 112, 432 88 C 374 65, 306 65, 248 88
           C 190 112, 152 158, 142 180 C 132 155, 170 108, 240 80 Z"/>
    </g>

  </g>

  <!-- ═══════════════════════════════════════════════════
       CAMADA MÉDIA — arcos intermediários
  ═══════════════════════════════════════════════════ -->
  <g class="sm">

    <g class="bb">
      <!-- Arco superior violeta -->
      <path fill="url(#dD)" opacity="0.75"
        d="M 340 78
           C 470 74, 578 148, 602 258
           C 618 330, 598 408, 550 466
           C 594 408, 612 335, 596 262
           C 572 152, 466 78, 340 78 Z"/>
      <path fill="url(#dD)" opacity="0.75"
        d="M 340 78
           C 210 74, 102 148, 78 258
           C 62 330, 82 408, 130 466
           C 86 408, 68 335, 84 262
           C 108 152, 214 78, 340 78 Z"/>
    </g>

    <g class="bc">
      <!-- Arco inferior laranja-magenta -->
      <path fill="url(#dE)" opacity="0.68"
        d="M 340 598
           C 468 600, 572 530, 600 424
           C 618 356, 602 284, 562 228
           C 604 282, 622 356, 604 425
           C 576 534, 470 604, 340 598 Z"/>
      <path fill="url(#dE)" opacity="0.68"
        d="M 340 598
           C 212 600, 108 530, 80 424
           C 62 356, 78 284, 118 228
           C 76 282, 58 356, 76 425
           C 104 534, 210 604, 340 598 Z"/>
    </g>

    <!-- Flancos turquesa -->
    <g class="ldb bd">
      <path fill="url(#dC)" opacity="0.58"
        d="M 165 152
           C 125 190, 95 242, 82 300
           C 70 358, 76 418, 100 470
           C 70 415, 58 354, 68 293
           C 80 228, 114 173, 165 135 Z"/>
      <path fill="url(#dC)" opacity="0.50"
        d="M 515 152
           C 555 190, 585 242, 598 300
           C 610 358, 604 418, 580 470
           C 610 415, 622 354, 612 293
           C 600 228, 566 173, 515 135 Z"/>
    </g>

    <!-- Núcleo radial azul inferior -->
    <g class="pb">
      <path fill="url(#coreB)" opacity="0.50"
        d="M 240 600 C 300 625, 390 625, 450 600 C 510 572, 548 525, 538 500
           C 528 522, 492 568, 432 592 C 374 615, 306 615, 248 592
           C 188 568, 152 522, 142 500 C 132 525, 170 572, 240 600 Z"/>
    </g>

  </g>

  <!-- ═══════════════════════════════════════════════════
       CAMADA INTERNA — próxima do vazio central
  ═══════════════════════════════════════════════════ -->
  <g class="si">

    <g class="bd">
      <path fill="url(#dA)" opacity="0.62"
        d="M 340 155
           C 445 152, 532 212, 558 302
           C 572 352, 562 408, 535 452
           C 510 494, 470 522, 425 534
           C 466 520, 504 492, 528 450
           C 556 402, 564 346, 550 296
           C 524 208, 438 150, 340 152 Z"/>
      <path fill="url(#dA)" opacity="0.62"
        d="M 340 155
           C 235 152, 148 212, 122 302
           C 108 352, 118 408, 145 452
           C 170 494, 210 522, 255 534
           C 214 520, 176 492, 152 450
           C 124 402, 116 346, 130 296
           C 156 208, 242 150, 340 152 Z"/>
    </g>

    <g class="ld bb">
      <path fill="url(#dG)" opacity="0.55"
        d="M 340 165
           C 415 162, 482 200, 516 262
           C 540 308, 544 365, 524 412
           C 544 362, 540 305, 516 260
           C 480 198, 414 162, 340 165 Z"/>
      <path fill="url(#dG)" opacity="0.48"
        d="M 340 165
           C 265 162, 198 200, 164 262
           C 140 308, 136 365, 156 412
           C 136 362, 140 305, 164 260
           C 200 198, 266 162, 340 165 Z"/>
    </g>

    <g class="bc">
      <path fill="url(#dB)" opacity="0.58"
        d="M 340 515
           C 430 516, 504 472, 530 400
           C 548 348, 538 290, 510 248
           C 538 288, 548 346, 530 398
           C 504 470, 432 514, 340 515 Z"/>
      <path fill="url(#dB)" opacity="0.58"
        d="M 340 515
           C 250 516, 176 472, 150 400
           C 132 348, 142 290, 170 248
           C 142 288, 132 346, 150 398
           C 176 470, 248 514, 340 515 Z"/>
    </g>

    <!-- Véu interno roxo — moldura do vazio central -->
    <g class="ldc ba">
      <path fill="url(#dF)" opacity="0.48"
        d="M 205 218
           C 170 250, 150 295, 148 342
           C 146 388, 162 432, 192 466
           C 160 432, 144 388, 146 340
           C 148 294, 168 248, 205 215 Z"/>
      <path fill="url(#dF)" opacity="0.42"
        d="M 476 218
           C 510 250, 530 295, 532 342
           C 534 388, 518 432, 488 466
           C 520 432, 536 388, 534 340
           C 532 294, 512 248, 476 215 Z"/>
    </g>

    <!-- Núcleo radial roxo lateral esquerdo -->
    <g class="pc">
      <path fill="url(#coreC)" opacity="0.45"
        d="M 60 240 C 40 290, 38 350, 60 400 C 72 430, 90 455, 112 472
           C 90 455, 74 430, 64 400 C 44 350, 46 290, 68 240
           C 80 210, 100 185, 124 168 C 102 185, 80 210, 60 240 Z"/>
    </g>

  </g>

  <!-- ═══════════════════════════════════════════════════
       PONTOS DE LUZ — cintilação estelar
  ═══════════════════════════════════════════════════ -->
  <g id="starfield">
    <circle class="tw1" cx="120" cy="155" r="2.5" fill="#ff88ff"/>
    <circle class="tw2" cx="560" cy="140" r="3"   fill="#88ddff"/>
    <circle class="tw3" cx="90"  cy="390" r="2"   fill="#cc88ff"/>
    <circle class="tw4" cx="598" cy="410" r="2.5" fill="#ff66cc"/>
    <circle class="tw5" cx="200" cy="105" r="2"   fill="#aaccff"/>
    <circle class="tw6" cx="490" cy="100" r="2.5" fill="#ff99ee"/>
    <circle class="tw7" cx="78"  cy="285" r="1.8" fill="#88ffee"/>
    <circle class="tw8" cx="610" cy="300" r="2"   fill="#bb88ff"/>
    <circle class="tw9" cx="340" cy="62"  r="2.5" fill="#ffaaff"/>

    <circle class="tw3" cx="155" cy="520" r="2"   fill="#66ccff"/>
    <circle class="tw1" cx="530" cy="540" r="2.5" fill="#ff77cc"/>
    <circle class="tw5" cx="265" cy="80"  r="1.8" fill="#cc99ff"/>
    <circle class="tw2" cx="425" cy="72"  r="2"   fill="#99eeff"/>
    <circle class="tw6" cx="628" cy="230" r="1.8" fill="#ff88cc"/>
    <circle class="tw4" cx="52"  cy="220" r="2"   fill="#aaffcc"/>
    <circle class="tw8" cx="340" cy="620" r="2.5" fill="#dd99ff"/>
    <circle class="tw7" cx="180" cy="608" r="1.8" fill="#88ccff"/>
    <circle class="tw9" cx="498" cy="600" r="2"   fill="#ffbbee"/>
  </g>

</svg>
